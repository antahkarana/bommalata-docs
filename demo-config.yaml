# Bommalata Demo Server Configuration
# For comprehensive demonstration of agentic capabilities

server:
  host: "127.0.0.1"
  port: 8080
  workspace: "/var/lib/smriti/workspace/projects/bommalata-docs/demo-workspace"

database:
  path: "./demo-data/bommalata.db"

providers:
  - name: openrouter
    type: openrouter
    models:
      - "openai/gpt-4o-mini"
      - "anthropic/claude-3.5-sonnet"
      - "google/gemini-2.0-flash-exp:free"
  
  - name: anthropic
    type: anthropic
    models:
      - "claude-3-5-sonnet-20241022"

logging:
  level: debug
  format: text

env_file: "/var/lib/smriti/workspace/projects/bommalata/local/secrets.env"
